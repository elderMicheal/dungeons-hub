backend:
  name: github
  repo: elderMicheal/dungeons-hub
  branch: main
  commit_messages:
    create: "Add {{collection}}: {{slug}}"
    update: "Update {{collection}}: {{slug}}"
    delete: "Retire {{collection}}: {{slug}}"
    uploadMedia: "Upload {{path}}"
    deleteMedia: "Remove {{path}}"

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "table_at_a_glance"
    label: "Table at a Glance"
    files:
      - name: "table_at_a_glance"
        label: "Table at a Glance"
        file: "content/table-at-a-glance.json"
        format: "json"
        fields:
          - { label: "Rules version", name: "rulesVersion", widget: "string", hint: "Example: 2014 D&D 5e." }
          - { label: "Starting level", name: "startingLevel", widget: "number", value_type: "int", min: 1, hint: "The level new characters start at." }
          - { label: "Campaign active", name: "campaignActive", widget: "boolean", hint: "Turn this on only after a real campaign begins." }
          - { label: "Main character required", name: "mainCharacterRequired", widget: "boolean", hint: "Whether each player should make a primary character." }
          - { label: "Companion character required", name: "companionCharacterRequired", widget: "boolean", hint: "Whether each player should also make a backup/companion character." }
          - { label: "Recommended beginner ancestries", name: "recommendedBeginnerAncestries", widget: "list", hint: "Add simple first-character options.", field: { label: "Ancestry", name: "ancestry", widget: "string" } }
          - { label: "Character source guidance", name: "characterSourceGuidance", widget: "text", hint: "Tell players what source options to use or exclude." }
          - { label: "Short summary", name: "shortSummary", widget: "string", hint: "Compact strip shown near the top of Start Here." }

  - name: "how_we_play"
    label: "How We Play Here"
    files:
      - name: "how_we_play"
        label: "How We Play Here"
        file: "content/how-we-play.json"
        format: "json"
        fields:
          - { label: "Page title", name: "title", widget: "string" }
          - { label: "Intro", name: "intro", widget: "text", hint: "Explain that this is the table-specific source of truth." }
          - label: "Table expectations"
            name: "entries"
            widget: "list"
            summary: "{{fields.title}} - {{fields.status}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Short version", name: "shortVersion", widget: "string", hint: "Use this for the one-sentence version players should see first." }
              - { label: "Detailed explanation", name: "detailedExplanation", widget: "text", hint: "Preserve the table voice, but make the rule easy to follow." }
              - { label: "Example", name: "example", widget: "text", required: false, hint: "Add an example only when it makes the rule easier to understand." }
              - { label: "Status", name: "status", widget: "select", options: ["Active", "Proposed", "Retired"] }
              - { label: "Last revised date", name: "lastRevisedDate", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "Optional note", name: "optionalNote", widget: "text", required: false }

  - name: "character_creation"
    label: "Character Creation"
    files:
      - name: "character_creation"
        label: "Character Creation"
        file: "content/character-creation.json"
        format: "json"
        fields:
          - { label: "Rules version", name: "rulesVersion", widget: "string" }
          - { label: "Exclude 2024 material", name: "exclude2024Material", widget: "boolean", hint: "Keep this on for the current table guidance." }
          - { label: "Starting level", name: "startingLevel", widget: "number", value_type: "int", min: 1 }
          - { label: "Ability-score method", name: "abilityScoreMethod", widget: "text", hint: "Example: Discuss with the DM before finalizing." }
          - { label: "Main character required", name: "mainCharacterRequired", widget: "boolean" }
          - { label: "Companion character required", name: "companionCharacterRequired", widget: "boolean" }
          - { label: "Recommended beginner ancestries", name: "recommendedBeginnerAncestries", widget: "list", field: { label: "Ancestry", name: "ancestry", widget: "string" } }
          - { label: "Recommended beginner classes", name: "recommendedBeginnerClasses", widget: "list", hint: "Use Class, not profession. A class is the main adventuring role.", field: { label: "Class", name: "class", widget: "string" } }
          - { label: "Allowed content policy", name: "allowedContentPolicy", widget: "text" }
          - { label: "Special options requiring discussion", name: "specialOptionsRequiringDiscussion", widget: "list", field: { label: "Option", name: "option", widget: "string" } }
          - { label: "Party connection requirement", name: "partyConnectionRequirement", widget: "text" }
          - { label: "Starting gear guidance", name: "startingGearGuidance", widget: "text" }
          - { label: "Magic-item story guidance", name: "magicItemStoryGuidance", widget: "text" }
          - { label: "Character creation checklist", name: "characterCreationChecklist", widget: "list", field: { label: "Step", name: "step", widget: "string" } }
          - label: "Detailed guide"
            name: "guide"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Intro note", name: "note", widget: "text" }
              - { label: "Fundamental guidelines", name: "fundamentalGuidelines", widget: "list", field: { label: "Guideline", name: "guideline", widget: "string" } }
              - { label: "Questions for the DM", name: "dmQuestions", widget: "list", field: { label: "Question", name: "question", widget: "string" } }
              - label: "Creation steps"
                name: "creationSteps"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
              - { label: "D&D Beyond steps", name: "dndBeyondSteps", widget: "list", field: { label: "Step", name: "step", widget: "string" } }
              - { label: "Beginner build advice", name: "beginnerBuildAdvice", widget: "list", field: { label: "Advice", name: "advice", widget: "string" } }
              - label: "Character parts"
                name: "characterParts"
                widget: "list"
                collapsed: true
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
              - label: "Ability scores"
                name: "abilityScores"
                widget: "list"
                collapsed: true
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
              - label: "Classes"
                name: "classes"
                widget: "list"
                collapsed: true
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
              - label: "Species, race, and ancestry"
                name: "species"
                widget: "list"
                collapsed: true
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
              - label: "Backgrounds"
                name: "backgrounds"
                widget: "list"
                collapsed: true
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
              - label: "Traits, features, flaws, and feats"
                name: "traits"
                widget: "list"
                collapsed: true
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
              - label: "Race summaries"
                name: "raceSummaries"
                widget: "list"
                collapsed: true
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Summary", name: "summary", widget: "text" }
                  - { label: "Good for", name: "beginnerUse", widget: "text" }
              - label: "Class summaries"
                name: "classSummaries"
                widget: "list"
                collapsed: true
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Role", name: "role", widget: "text" }
                  - { label: "Beginner note", name: "beginnerNote", widget: "text" }
              - label: "Key traits and concepts"
                name: "keyConcepts"
                widget: "list"
                collapsed: true
                fields:
                  - { label: "Term", name: "term", widget: "string" }
                  - { label: "Definition", name: "definition", widget: "text" }
              - label: "Premade example characters"
                name: "exampleCharacters"
                widget: "list"
                collapsed: true
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Race", name: "race", widget: "string" }
                  - { label: "Class", name: "className", widget: "string" }
                  - { label: "Level", name: "level", widget: "number", value_type: "int" }
                  - { label: "HP", name: "hp", widget: "string" }
                  - { label: "AC", name: "ac", widget: "number", value_type: "int" }
                  - { label: "Role", name: "role", widget: "string" }
                  - { label: "Stats", name: "stats", widget: "object", fields: [{ label: "STR", name: "STR", widget: "number", value_type: "int" }, { label: "DEX", name: "DEX", widget: "number", value_type: "int" }, { label: "CON", name: "CON", widget: "number", value_type: "int" }, { label: "INT", name: "INT", widget: "number", value_type: "int" }, { label: "WIS", name: "WIS", widget: "number", value_type: "int" }, { label: "CHA", name: "CHA", widget: "number", value_type: "int" }] }
              - label: "Session Zero checklist"
                name: "sessionZeroChecklist"
                widget: "list"
                collapsed: true
                fields:
                  - { label: "Topic", name: "topic", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
              - label: "Learn More references"
                name: "references"
                widget: "list"
                fields:
                  - { label: "Type", name: "type", widget: "string" }
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string", pattern: ['^https?://.+$', "Enter a full URL starting with https://"] }
                  - { label: "Description", name: "description", widget: "text" }

  - name: "house_rules"
    label: "House Rules"
    files:
      - name: "house_rules"
        label: "House Rules"
        file: "content/house-rules/index.json"
        format: "json"
        fields:
          - label: "House rules"
            name: "rules"
            widget: "list"
            summary: "{{fields.title}} - {{fields.status}}"
            hint: "Mark a rule Retired instead of deleting it so the history remains available."
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Category", name: "category", widget: "select", options: ["Character Creation", "Combat", "Magic", "Resting", "Equipment", "Roleplay", "Table Conduct", "Scheduling", "Other"] }
              - { label: "Status", name: "status", widget: "select", options: ["Proposed", "Active", "Revised", "Retired"], hint: "Use Proposed for a rule the group is testing but has not adopted yet." }
              - { label: "Short version", name: "shortVersion", widget: "string" }
              - { label: "Full explanation", name: "fullExplanation", widget: "text" }
              - { label: "Why the table uses it", name: "whyTheTableUsesIt", widget: "text" }
              - { label: "Example in play", name: "exampleInPlay", widget: "text", required: false }
              - { label: "Exceptions", name: "exceptions", widget: "text", required: false }
              - { label: "Date added", name: "dateAdded", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "Last revised", name: "lastRevised", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "Version number", name: "versionNumber", widget: "number", value_type: "int", min: 1 }
              - { label: "Replaces rule", name: "replacesRule", widget: "string", required: false }
              - { label: "Optional notes", name: "optionalNotes", widget: "text", required: false }

  - name: "tone_and_boundaries"
    label: "Tone & Boundaries"
    files:
      - name: "tone_and_boundaries"
        label: "Tone & Boundaries"
        file: "content/tone-and-boundaries.json"
        format: "json"
        fields:
          - { label: "Campaign tone", name: "campaignTone", widget: "text" }
          - { label: "Humor and seriousness guidance", name: "humorAndSeriousnessGuidance", widget: "text" }
          - { label: "Themes to avoid", name: "themesToAvoid", widget: "list", required: false, field: { label: "Theme", name: "theme", widget: "string" } }
          - { label: "Off-limits content", name: "offLimitsContent", widget: "list", required: false, field: { label: "Content", name: "content", widget: "string" } }
          - { label: "How to raise a concern", name: "howToRaiseAConcern", widget: "list", field: { label: "Method", name: "method", widget: "string" } }
          - { label: "Player-versus-player policy", name: "playerVersusPlayerPolicy", widget: "text" }
          - { label: "Inter-party conflict policy", name: "interPartyConflictPolicy", widget: "text" }
          - { label: "Consent expectations", name: "consentExpectations", widget: "text", hint: "Players do not need to defend or debate a boundary." }

  - name: "tools_and_links"
    label: "Tools & Links"
    files:
      - name: "tools_and_links"
        label: "Tools & Links"
        file: "content/tools-and-links.json"
        format: "json"
        fields:
          - { label: "Discord invite link", name: "discordInviteLink", widget: "string", required: false, pattern: ['^(https?://.+)?$', "Enter a full URL or leave blank."] }
          - { label: "Discord voice link", name: "discordVoiceLink", widget: "string", required: false, pattern: ['^(https?://.+)?$', "Enter a full URL or leave blank."] }
          - { label: "D&D Beyond campaign link", name: "dndBeyondCampaignLink", widget: "string", required: false, pattern: ['^(https?://.+)?$', "Enter a full URL or leave blank."] }
          - { label: "D&D Beyond character-builder link", name: "dndBeyondCharacterBuilderLink", widget: "string", required: false, pattern: ['^(https?://.+)?$', "Enter a full URL or leave blank."] }
          - { label: "Official rules reference link", name: "officialRulesReferenceLink", widget: "string", required: false, pattern: ['^(https?://.+)?$', "Enter a full URL or leave blank."] }
          - { label: "Owlbear Rodeo link", name: "owlbearRodeoLink", widget: "string", required: false, pattern: ['^(https?://.+)?$', "Enter a full URL or leave blank."] }
          - { label: "Roll20 link", name: "roll20Link", widget: "string", required: false, pattern: ['^(https?://.+)?$', "Enter a full URL or leave blank."] }
          - { label: "D&D Beyond help link", name: "dndBeyondHelpLink", widget: "string", required: false, pattern: ['^(https?://.+)?$', "Enter a full URL or leave blank."] }
          - { label: "Discord help link", name: "discordHelpLink", widget: "string", required: false, pattern: ['^(https?://.+)?$', "Enter a full URL or leave blank."] }
          - { label: "Owlbear help link", name: "owlbearHelpLink", widget: "string", required: false, pattern: ['^(https?://.+)?$', "Enter a full URL or leave blank."] }
          - { label: "Roll20 help link", name: "roll20HelpLink", widget: "string", required: false, pattern: ['^(https?://.+)?$', "Enter a full URL or leave blank."] }

  - name: "campaign_status"
    label: "Campaign Status"
    files:
      - name: "campaign_status"
        label: "Campaign Status"
        file: "content/campaign-status.json"
        format: "json"
        fields:
          - { label: "Campaign active", name: "campaignActive", widget: "boolean" }
          - { label: "Campaign name", name: "campaignName", widget: "string", required: false }
          - { label: "Campaign summary", name: "campaignSummary", widget: "text" }
          - { label: "Current stage", name: "currentStage", widget: "string", required: false }
          - { label: "Next session date", name: "nextSessionDate", widget: "datetime", required: false, date_format: "YYYY-MM-DD", time_format: false }
          - { label: "Next session time", name: "nextSessionTime", widget: "string", required: false }
          - { label: "Current party level", name: "currentPartyLevel", widget: "string", required: false }
          - { label: "Current location", name: "currentLocation", widget: "string", required: false }
          - { label: "Current objective", name: "currentObjective", widget: "text", required: false }

  - name: "sessions_and_recaps"
    label: "Sessions & Recaps"
    files:
      - name: "sessions"
        label: "Sessions & Recaps"
        file: "content/sessions/index.json"
        format: "json"
        fields:
          - label: "Sessions"
            name: "sessions"
            widget: "list"
            summary: "Session {{fields.sessionNumber}} - {{fields.title}}"
            fields:
              - { label: "Session number", name: "sessionNumber", widget: "number", value_type: "int", min: 1 }
              - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Attendance", name: "attendance", widget: "list", field: { label: "Player", name: "player", widget: "string" } }
              - { label: "Summary", name: "summary", widget: "list", field: { label: "Summary point", name: "point", widget: "text" } }
              - { label: "Major events", name: "majorEvents", widget: "list", required: false, field: { label: "Event", name: "event", widget: "text" } }
              - { label: "NPCs met", name: "npcsMet", widget: "list", required: false, field: { label: "NPC", name: "npc", widget: "string" } }
              - { label: "Loot gained", name: "lootGained", widget: "list", required: false, field: { label: "Loot", name: "loot", widget: "string" } }
              - { label: "Clues found", name: "cluesFound", widget: "list", required: false, field: { label: "Clue", name: "clue", widget: "text" } }
              - { label: "Unresolved questions", name: "unresolvedQuestions", widget: "list", required: false, field: { label: "Question", name: "question", widget: "text" } }
              - { label: "Next objective", name: "nextObjective", widget: "text", required: false }
              - { label: "Status", name: "status", widget: "select", options: ["Draft", "Published", "Archived"] }

  - name: "help_and_glossary"
    label: "Help & Glossary"
    files:
      - name: "help_and_glossary"
        label: "Help & Glossary"
        file: "content/help-and-glossary.json"
        format: "json"
        fields:
          - { label: "Quick-start tutorial", name: "quickStartTutorial", widget: "list", field: { label: "Step", name: "step", widget: "string" } }
          - label: "Frequently asked questions"
            name: "faq"
            widget: "list"
            summary: "{{fields.question}}"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Short answer", name: "shortAnswer", widget: "text" }
              - { label: "Optional longer answer", name: "longerAnswer", widget: "text", required: false }
              - { label: "Related page", name: "relatedPage", widget: "string", required: false }
              - { label: "Status", name: "status", widget: "select", options: ["Active", "Retired"], default: "Active" }
          - label: "Glossary"
            name: "glossary"
            widget: "list"
            summary: "{{fields.term}}"
            fields:
              - { label: "Term", name: "term", widget: "string" }
              - { label: "Plain-language definition", name: "plainLanguageDefinition", widget: "text" }
              - { label: "Optional example", name: "example", widget: "text", required: false }
              - { label: "Status", name: "status", widget: "select", options: ["Active", "Retired"], default: "Active" }
          - { label: "Character sheet guide", name: "characterSheetGuide", widget: "list", fields: [{ label: "Label", name: "label", widget: "string" }, { label: "Description", name: "description", widget: "text" }] }
          - { label: "Where to find answers", name: "whereToFindAnswers", widget: "list", fields: [{ label: "Need", name: "need", widget: "string" }, { label: "Destination", name: "destination", widget: "text" }] }
          - { label: "External learning resources", name: "externalLearningResources", widget: "list", fields: [{ label: "Label", name: "label", widget: "string" }, { label: "URL", name: "url", widget: "string", required: false, pattern: ['^(https?://.+)?$', "Enter a full URL or leave blank."] }, { label: "Description", name: "description", widget: "text" }] }

  - name: "change_log"
    label: "Change Log"
    files:
      - name: "change_log"
        label: "Change Log"
        file: "content/change-log/index.json"
        format: "json"
        fields:
          - label: "Entries"
            name: "entries"
            widget: "list"
            summary: "{{fields.date}} - {{fields.title}}"
            fields:
              - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "What changed", name: "whatChanged", widget: "text" }
              - { label: "Why it changed", name: "whyItChanged", widget: "text" }
              - { label: "Related house rule", name: "relatedHouseRule", widget: "string", required: false }
              - { label: "Status", name: "status", widget: "select", options: ["Draft", "Published", "Archived"] }
