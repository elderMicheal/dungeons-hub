<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A beginner-friendly D&D launchpad for Micheal and the crew.">
  <title>Dungeons Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#home" aria-label="Dungeons Hub home">
      <span class="brand-mark" aria-hidden="true">
        <img src="assets/dungeons-asset-home.png" alt="">
      </span>
      <span>
        <strong>Dungeons Hub</strong>
        <small>Gather the party</small>
      </span>
    </a>
    <button id="navToggle" class="nav-toggle" type="button" aria-controls="siteNav" aria-expanded="false" aria-label="Open navigation menu">
      <span class="hamburger" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
    <nav id="siteNav" class="site-nav" aria-label="Main navigation">
      <a href="#home" data-route-link="home">Home</a>
      <a href="#start" data-route-link="start">Start Here</a>
      <a href="#session-minus-one" data-route-link="session-minus-one">Session −1</a>
      <a href="#session-zero" data-route-link="session-zero">Session 0</a>
      <a href="#tools" data-route-link="tools">Tools</a>
      <a href="#vtt" data-route-link="vtt">VTT</a>
      <a href="#rules" data-route-link="rules">Rules</a>
      <a href="#help" data-route-link="help">Help</a>
      <a href="#join" data-route-link="join">Join</a>
    </nav>
  </header>

  <main id="app" class="app-shell" tabindex="-1"></main>

  <footer id="siteFooter" class="site-footer" aria-label="Site footer"></footer>

  <noscript>
    <section class="noscript">
      <h1>Dungeons Hub needs JavaScript</h1>
      <p>This static site uses a small amount of JavaScript for navigation, dice rolling, and initiative tracking.</p>
    </section>
  </noscript>

  <script src="app.js"></script>
</body>
</html>
