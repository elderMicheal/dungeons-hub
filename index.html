<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A beginner-friendly D&D launchpad for Micheal and the crew.">
  <title>Dungeons Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <svg class="svg-sprite" aria-hidden="true" focusable="false">
    <symbol id="i-home" viewBox="0 0 24 24"><path d="M3 10.8 12 3l9 7.8v9.5a.7.7 0 0 1-.7.7H14v-6H10v6H3.7a.7.7 0 0 1-.7-.7z"/></symbol>

    <symbol id="i-tools" viewBox="0 0 24 24"><path d="m14.7 6.6 2.7-2.7 2.7 2.7-2.7 2.7M4.1 19.9l7.4-7.4M5 5l5 5M3.9 6.1 6.1 3.9l5 5-2.2 2.2zM13.5 12.5l6.6 6.6-2.1 2.1-6.6-6.6z"/></symbol>
    <symbol id="i-scales" viewBox="0 0 24 24"><path d="M12 3v17M5 7h14M7 7l-3.5 6h7zM17 7l-3.5 6h7zM8.5 21h7"/></symbol>
    <symbol id="i-mask" viewBox="0 0 24 24"><path d="M3.4 6.3C7.4 3.4 16.6 3.4 20.6 6.3v6c0 4.5-4 7.6-8.6 8.8-4.6-1.2-8.6-4.3-8.6-8.8z"/><path d="M7.5 11.1h3.1M13.4 11.1h3.1M12 12.2v3.2"/></symbol>
    <symbol id="i-help" viewBox="0 0 24 24"><path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18z"/><path d="M9.5 9.2c.1-1.7 1.2-2.7 2.8-2.7 1.6 0 2.8 1 2.8 2.5 0 2-2.5 2.2-2.5 4.1M12 17.7h.01"/></symbol>
    <symbol id="i-users" viewBox="0 0 24 24"><path d="M8.1 11.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4zM15.9 11.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4zM2.9 20.2c.3-4 2.2-6.1 5.2-6.1s4.9 2.1 5.2 6.1M10.7 20.2c.3-3.7 2.1-5.6 5.2-5.6s4.9 1.9 5.2 5.6"/></symbol>
    <symbol id="i-d20" viewBox="0 0 24 24"><path d="m12 2.8 8.4 5.1v8.2L12 21.2l-8.4-5.1V7.9zM12 2.8v18.4M3.6 7.9 12 13l8.4-5.1M3.6 16.1 12 13l8.4 3.1"/></symbol>

    <symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 3 20 6v5.6c0 4.8-3.1 7.8-8 9.4-4.9-1.6-8-4.6-8-9.4V6z"/><path d="m8.4 12 2.3 2.3 4.9-5"/></symbol>
    <symbol id="i-discord" viewBox="0 0 24 24"><path d="M19.1 5.3A17 17 0 0 0 15 4l-.5 1.1a15.1 15.1 0 0 0-5 0L9 4a17 17 0 0 0-4.1 1.3C2.3 9.3 1.6 13.2 2 17.1a16.3 16.3 0 0 0 5 2.5l1.2-1.6c-.7-.3-1.4-.7-2-1.1l.5-.4c3.7 1.7 7.7 1.7 11.3 0l.5.4c-.6.4-1.3.8-2 1.1l1.2 1.6a16.3 16.3 0 0 0 5-2.5c.5-4.5-.8-8.4-3.6-11.8ZM8.7 14.7c-1 0-1.8-.9-1.8-2s.8-2 1.8-2 1.8.9 1.8 2-.8 2-1.8 2Zm6.6 0c-1 0-1.8-.9-1.8-2s.8-2 1.8-2 1.8.9 1.8 2-.8 2-1.8 2Z"/></symbol>
    <symbol id="i-video" viewBox="0 0 24 24"><path d="M3.5 6.2c0-1 1-1.7 2-1.5l11.2 2c.7.1 1.2.8 1.2 1.5v7.6c0 .7-.5 1.4-1.2 1.5l-11.2 2c-1 .2-2-.5-2-1.5z"/><path d="m10 9 4.5 3L10 15z"/></symbol>
    <symbol id="i-arrow" viewBox="0 0 24 24"><path d="M5 12h13M13 6l6 6-6 6"/></symbol>
  </svg>

  <div class="site-shell" id="siteShell">
    <section class="book-viewport" aria-label="Dungeons Hub spellbook">
      <div class="binding" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
      <main id="app" class="app-shell page-root" tabindex="-1"></main>
      <aside class="edge-tabs" aria-label="Section tabs">
        <a class="edge-tab tab-start" href="#start" data-route-link="start" title="Start Here"><svg aria-hidden="true"><use href="#i-book"></use></svg><span>Start</span></a>
        <a class="edge-tab tab-tools" href="#session-minus-one" data-route-link="session-minus-one" title="Session −1"><svg aria-hidden="true"><use href="#i-spark"></use></svg><span>Setup</span></a>
        <a class="edge-tab tab-roles" href="#session-zero" data-route-link="session-zero" title="Session 0"><svg aria-hidden="true"><use href="#i-users"></use></svg><span>Zero</span></a>
        <a class="edge-tab tab-rules" href="#vtt" data-route-link="vtt" title="VTT"><svg aria-hidden="true"><use href="#i-d20"></use></svg><span>VTT</span></a>
        <a class="edge-tab tab-help" href="#help" data-route-link="help" title="Help"><svg aria-hidden="true"><use href="#i-help"></use></svg><span>Help</span></a>
        <a class="edge-tab tab-join" href="#join" data-route-link="join" title="Join"><svg aria-hidden="true"><use href="#i-users"></use></svg><span>Join</span></a>
      </aside>
    </section>

    <footer id="siteFooter" class="site-footer command-deck" aria-label="Site footer"></footer>
  </div>

  <noscript>
    <section class="noscript">
      <h1>Dungeons Hub needs JavaScript</h1>
      <p>This static site uses a small amount of JavaScript for navigation, dice rolling, and initiative tracking.</p>
    </section>
  </noscript>

  <script src="app.js"></script>
</body>
</html>
